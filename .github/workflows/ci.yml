name: pentest-tools

on:
  workflow_dispatch: {}

# Skip CI for dependabot PRs that only touch lock files (the test job
# already runs against the bumped versions; running again on PR is
# redundant noise).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        # Engagement-lifecycle E2E runs the full deterministic phase list
        # against in-test apps (~6min). It belongs in the dedicated e2e-juiceshop
        # job, not in every matrix cell, otherwise we burn ~36 CI minutes per
        # push for redundant coverage.
        run: pytest tests/ -v --tb=short --ignore=tests/test_engagement_lifecycle_e2e.py

  lint:
    name: lint + type check (ubuntu / py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check . || true

      - name: Run mypy
        run: mypy mcp_server engine tools agents --ignore-missing-imports

  e2e-juiceshop:
    name: e2e smoke (juice shop)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      juiceshop:
        image: bkimminich/juice-shop:latest
        ports:
          - 3000:3000
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pttools + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install minimal external tools (gobuster + ffuf via apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gobuster ffuf

      - name: Install Playwright + chromium (for browser-agent E2E)
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Wait for Juice Shop to come up
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000 > /dev/null 2>&1; then
              echo "Juice Shop is ready"
              exit 0
            fi
            echo "Waiting for Juice Shop ($i/30)..."
            sleep 2
          done
          echo "Juice Shop failed to start"
          exit 1

      - name: Run E2E smoke tests
        env:
          PTAI_E2E_JUICESHOP: "1"
          PTAI_E2E_JUICESHOP_URL: "http://localhost:3000"
          PTAI_E2E_BROWSER: "1"
        run: |
          pytest tests/test_juiceshop_e2e_smoke.py tests/test_engagement_lifecycle_e2e.py tests/test_browser_agent_e2e_smoke.py -v --tb=short
