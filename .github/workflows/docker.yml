name: Build and push container image to ghcr.io

# Triggered alongside the PyPI release: tag v*.*.* fires both this and release.yml.
# Builds prod + dev images, pushes to ghcr.io/0xsteph/pentest-tools with the version tag and "latest".

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.10.3)"
        required: true

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v3

      - name: Log in to ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push prod image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v6
        with:
          context: .
          target: prod
          push: true
          tags: |
            ghcr.io/0xsteph/pentest-tools:${{ steps.meta.outputs.version }}
            ghcr.io/0xsteph/pentest-tools:latest
          labels: |
            org.opencontainers.image.source=https://github.com/pentest-tools/pentest-tools
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test the published image
        run: |
          docker pull ghcr.io/0xsteph/pentest-tools:${{ steps.meta.outputs.version }}
          docker run --rm ghcr.io/0xsteph/pentest-tools:${{ steps.meta.outputs.version }} pttools --version
