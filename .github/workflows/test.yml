name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'specs/**'
      - 'examples/**'
      - 'benchmarks/**'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.dockerignore'
      - '.github/CODEOWNERS'
      - '.github/ISSUE_TEMPLATE/**'
      - 'SECURITY.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'specs/**'
      - 'examples/**'
      - 'benchmarks/**'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.dockerignore'
      - '.github/CODEOWNERS'
      - '.github/ISSUE_TEMPLATE/**'
      - 'SECURITY.md'
  workflow_dispatch: {}

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio anyio

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Show coverage if pytest-cov installed
        if: success()
        run: |
          pytest tests/ --cov=. --cov-report=term-missing --cov-report=xml || true

  lint:
    name: ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check . || true
        # `|| true` because the existing codebase predates ruff. Switch to strict
        # once a baseline `ruff check . --statistics` is clean.
