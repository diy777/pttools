name: security

# Security gate: bandit (HIGH severity) + pip-audit + gitleaks.
# Runs on every push to main and every PR.
# Baseline is 0 HIGH bandit findings, 0 known-vulnerable deps, 0 leaked secrets.
# Medium-severity bandit findings are tracked in CHANGELOG, not gated here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - run: pip install bandit
      - run: bandit -r mcp_server engine tools agents cli -lll -ii --skip B101

  pip_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install project deps
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv venv
          source .venv/bin/activate
          # Upgrade pip first so the audit doesn't trip on a CVE in the
          # base-image pip itself (e.g. CVE-2026-3219).
          uv pip install --upgrade pip
          uv pip install -e ".[dev]"
          uv pip install pip-audit
      - name: Audit
        run: |
          source .venv/bin/activate
          pip-audit --strict

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
