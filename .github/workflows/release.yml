name: Release to PyPI

# Triggered by pushing a version tag like v0.10.3 or v1.0.0.
# Tag must match the version in pyproject.toml or the publish step fails.
#
# To cut a release:
#   1. bump version in pyproject.toml + CHANGELOG.md, commit
#   2. git tag v0.10.3 && git push --tags
#   3. this workflow builds, tests, and uploads to PyPI
#
# Uses PyPI Trusted Publishing (OIDC). No API token needed in repo secrets.
# Configure once at https://pypi.org/manage/project/pttools/settings/publishing/
# with: workflow filename "release.yml", env name "pypi".
#
# Fallback: if Trusted Publishing isn't configured, set PYPI_API_TOKEN as a
# repo secret and uncomment the password line in the publish step below.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write   # required for PyPI Trusted Publishing

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install deps
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/ --tb=short -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${TAG#v}"
          PROJ_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag version:       $TAG_VERSION"
          echo "pyproject version: $PROJ_VERSION"
          if [ "$TAG_VERSION" != "$PROJ_VERSION" ]; then
            echo "::error::tag $TAG_VERSION != pyproject.toml $PROJ_VERSION. Bump version in pyproject.toml first."
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: Upload dist as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download dist
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        # If you can't configure Trusted Publishing, comment the line above and
        # uncomment the block below after adding PYPI_API_TOKEN as a repo secret:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
